<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Shinigami Esse Menu</title>
    <meta name="description" content="Shinigami Esse - Enhanced FiveM NUI Menu">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Orbitron:wght@400;500;700;900&display=swap"
        rel="stylesheet">

    <!-- CRITICAL: Inline transparency -->
    <style>
        html, body {
            background: transparent !important;
            background-color: transparent !important;
            margin: 0;
            padding: 0;
        }
    </style>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Atmospheric scanline overlay -->
    <div class="scanline-overlay" aria-hidden="true"></div>

    <!-- Main Menu -->
    <div class="nui-wrapper" id="mainMenu">
        <div class="menu-container" id="menuContainer">

            <!-- Banner (optional) -->
            <div class="menu-banner" id="menuBanner" style="display:none;">
                <img id="bannerImage" src="" alt="Banner">
            </div>

            <!-- Header -->
            <div class="menu-header">
                <div class="menu-title" id="menuTitle">SHINIGAM<span class="accent">I</span></div>
                <div class="menu-subtitle" id="menuSubtitle">ESSE &nbsp;•&nbsp; V2</div>
            </div>

            <!-- Active category name badge -->
            <div class="category-badge" id="categoryBadge">
                <span class="category-badge-dot"></span>
                <span id="categoryBadgeName">List</span>
            </div>

            <!-- Category tabs -->
            <div class="category-tabs" id="categoryTabs"></div>

            <!-- Menu items -->
            <div class="menu-items-wrapper" id="menuItemsWrapper">
                <ul class="menu-list" id="menuList"></ul>
            </div>

            <!-- Active item description bar -->
            <div class="desc-bar" id="descBar">Select an option</div>

            <!-- Footer -->
            <div class="menu-footer">
                <span class="footer-credit" id="footerCredit">/Made By | Frncs</span>
                <span class="footer-counter" id="itemCounter">01/08</span>
            </div>

        </div>
    </div>

    <!-- Keyboard Input Overlay -->
    <div class="keyboard-overlay" id="keyboardOverlay" role="dialog" aria-modal="true">
        <div class="keyboard-container">
            <div class="keyboard-header">
                <div class="keyboard-title" id="keyboardTitle">INPUT</div>
            </div>
            <div class="keyboard-display">
                <span class="keyboard-value" id="keyboardValue"></span>
                <span class="keyboard-cursor">|</span>
            </div>
            <div class="keyboard-footer">
                <span>ENTER to confirm &bull; ESC to cancel</span>
            </div>
        </div>
    </div>

    <!-- Key Selector Overlay -->
    <div class="key-selector-overlay" id="keySelectorOverlay" role="dialog" aria-modal="true">
        <div class="key-selector-container">
            <div class="key-selector-header">
                <div class="key-selector-title">SELECT MENU KEY</div>
                <div class="key-selector-subtitle">Press any key to bind</div>
            </div>
            <div class="key-selector-display" id="keyDisplay">
                <span class="key-placeholder">⌨</span>
            </div>
            <div class="key-selector-footer">
                <span>Press ESC to cancel</span>
            </div>
        </div>
    </div>

    <!-- Notification Container -->
    <div class="notification-container" id="notificationContainer" aria-live="polite"></div>

    <script src="script.js"></script>
</body>

</html>
